

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI - Purby | 9주차 발표</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #1A1236;
    transition: background 0.4s ease;
  }
  code { font-family: 'Consolas', 'Courier New', monospace; }
  button { font-family: inherit; cursor: pointer; }
  button:disabled { cursor: not-allowed; }

  /* 레이아웃 */
  #app { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
  #header {
    height: 52px; background: #1A1236; display: flex; align-items: center;
    justify-content: space-between; padding: 0 32px; flex-shrink: 0;
    border-bottom: 1px solid rgba(107,92,231,0.3);
  }
  #header-left { display: flex; align-items: center; gap: 12px; }
  #logo {
    width: 28px; height: 28px; border-radius: 6px; background: #6B5CE7;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff;
  }
  #header-title { color: #fff; font-weight: 600; font-size: 18px; }
  #header-sub { color: #8B88AA; font-size: 15px; }
  #nav-tabs { display: none; }
  .nav-tab {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: #8B88AA; font-size: 14px; padding: 4px 8px;
    transition: all 0.2s; font-family: inherit;
  }
  .nav-tab.active { color: #6B5CE7; border-bottom-color: #6B5CE7; font-weight: 700; }

  #slide-wrapper {
    flex: 1; overflow: hidden; display: flex; flex-direction: column;
    animation: fadeSlide 0.35s ease forwards;
  }
  #slide-header {
    padding: 18px 5% 0; display: flex;
    justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  #slide-header h2 { font-size: 26px; font-weight: 700; }
  #slide-header span { font-size: 14px; color: #8B88AA; letter-spacing: 1px; }
  #slide-body { flex: 1; overflow: hidden; }

  #footer { display: none; }
  .nav-btn {
    background: none; border: 1px solid rgba(107,92,231,0.4); border-radius: 6px;
    color: #9B8FFF; padding: 4px 14px; font-size: 17px; transition: all 0.2s;
  }
  .nav-btn.next { background: #6B5CE7; border-color: #6B5CE7; color: #fff; }
  .nav-btn:disabled { opacity: 0.4; background: none; }
  #dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    height: 7px; border-radius: 4px; cursor: pointer;
    background: rgba(139,136,170,0.4); transition: all 0.3s ease;
  }
  .dot.active { background: #6B5CE7; }
  #progress-bar { display: none; }
  #progress-fill { height: 100%; background: #6B5CE7; transition: width 0.4s ease; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 슬라이드 공통 */
  .slide { padding: 0 4%; height: 100%; display: flex; flex-direction: column; justify-content: center; }
  .card-white {
    background: #fff; border-radius: 12px; padding: 20px;
    border: 1px solid #E8E3FF;
  }
  .card-dark {
    background: #251B4B; border-radius: 12px; padding: 20px;
    border: 1px solid rgba(107,92,231,0.3);
  }
  .card-left-border { border-left: 4px solid #6B5CE7; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .label-sm { font-size: 17px; color: #6B6884; font-weight: 700; letter-spacing: 1px; margin-bottom: 14px; }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 6px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
  }
  .badge-done { background: rgba(34,197,94,0.15); color: #22C55E; border: 1px solid rgba(34,197,94,0.35); }
  .badge-wip  { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.35); }
  .divider { border: none; border-bottom: 1px solid rgba(107,92,231,0.15); margin: 0; }

  /* S1: 타이틀 */
  #s-title { display: flex; height: 100%; align-items: center; padding: 0 5%; gap: 40px; }
  #s-title-left { flex: 1; }
  .week-badge {
    display: inline-block; padding: 4px 14px; border-radius: 8px;
    background: #6B5CE7; color: #fff; font-size: 15px; font-weight: 700;
    letter-spacing: 2px; margin-bottom: 24px;
  }
  #s-title h1 { font-size: clamp(56px,7vw,90px); font-weight: 900; color: #fff; line-height: 1.05; margin-bottom: 12px; }
  #s-title p.sub { font-size: clamp(20px,2.5vw,26px); color: #9B8FFF; margin-bottom: 32px; }
  #title-divider { width: 120px; height: 3px; background: #6B5CE7; border-radius: 2px; margin-bottom: 28px; }
  #title-team { color: #8B88AA; font-size: 18px; letter-spacing: 0.5px; }
  #title-cards { width: 260px; display: flex; flex-direction: column; gap: 12px; }
  .title-card {
    background: #251B4B; border-radius: 10px; padding: 14px 18px;
  }
  .title-card .tc-label { font-size: 14px; color: #8B88AA; margin-bottom: 4px; }
  .title-card .tc-val { font-size: 30px; font-weight: 800; margin-bottom: 8px; }
  .progress-track { height: 5px; background: #2D2456; border-radius: 3px; }
  .progress-fill-anim { height: 100%; border-radius: 3px; transition: width 1.2s ease; }

  /* S3: Flutter */
  .tab-row {
    display: flex; align-items: center; gap: 12px;
    background: #F5F3FF; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
  }
  .tab-num {
    width: 28px; height: 28px; border-radius: 50%; background: #6B5CE7; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700; flex-shrink: 0;
  }
  .feat-row {
    background: #F5F3FF; border-radius: 8px; padding: 12px 14px;
    margin-bottom: 10px; border-left: 3px solid #6B5CE7;
  }

  /* S4: FastAPI */
  .ep-row {
    display: flex; align-items: center; gap: 8px; padding: 5px 0;
    border-bottom: 1px solid rgba(107,92,231,0.15);
  }
  .method-badge {
    min-width: 54px; padding: 2px 0; border-radius: 4px;
    font-size: 13px; font-weight: 700; text-align: center;
  }
  .dir-row {
    display: flex; align-items: center; gap: 12px; padding: 7px 0;
    border-bottom: 1px solid rgba(107,92,231,0.15);
  }

  /* S5: FastAPI */
  .arch-boxes { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .arch-box { border-radius: 10px; padding: 16px 22px; color: #fff; text-align: center; min-width: 160px; }
  .arch-arrow { display: flex; flex-direction: column; align-items: center; padding: 0 8px; }
  .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .check-item { display: flex; align-items: center; gap: 8px; font-size: 15px; }

  /* S8: Q&A */
  #s-qa { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .qa-circle {
    width: 200px; height: 200px; border-radius: 50%;
    background: rgba(107,92,231,0.13); display: flex; align-items: center;
    justify-content: center; margin-bottom: 32px;
    border: 2px solid rgba(107,92,231,0.3);
  }
</style>
</head>
<body>
<div id="app">
  <!-- 헤더 -->
  <div id="header">
    <div id="header-left">
      <div id="logo">AI</div>
      <span id="header-title">AI - Purby</span>
      <span id="header-sub">9주차 발표</span>
    </div>
    <div id="nav-tabs"></div>
  </div>

  <!-- 슬라이드 -->
  <div id="slide-wrapper">
    <div id="slide-header" style="display:none">
      <h2 id="slide-title-text"></h2>
      <span id="slide-label-text"></span>
    </div>
    <div id="slide-body"></div>
  </div>

  <!-- 푸터 -->
  <div id="footer">
    <button class="nav-btn prev-btn" id="btn-prev">← 이전</button>
    <div id="dots"></div>
    <button class="nav-btn next nav-btn" id="btn-next">다음 →</button>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<script>
const C = {
  purple:"#6B5CE7", purpleL:"#9B8FFF", bg:"#1A1236",
  card:"#251B4B", muted:"#8B88AA", mutedL:"#6B6884",
  text:"#1E1240", lightBg:"#F5F3FF",
  green:"#22C55E", amber:"#F59E0B", blue:"#60A5FA", red:"#F87171"
};

// ── 슬라이드 데이터 ──────────────────────────────────────────
const SLIDES = [
  { label:"타이틀",    header:"",              sub:"",                   dark:true  },
  { label:"진행 요약", header:"이번 주 진행 요약",     sub:"WEEK 09 SUMMARY",    dark:false },
  { label:"Flutter 앱",header:"Flutter 앱 개발 현황", sub:"MOBILE CLIENT",       dark:false },
  { label:"이메일 인증", header:"이메일 인증 플로우", sub:"EMAIL AUTH",          dark:false },
  { label:"JWT 자동 로그인", header:"JWT 자동 로그인", sub:"AUTO LOGIN",         dark:false },
  { label:"백엔드 API 연동", header:"백엔드 API 연동", sub:"BACKEND SYNC",       dark:false },
  { label:"성격 커스터마이징", header:"성격 커스터마이징", sub:"AI PERSONALITY",    dark:false },
  { label:"일정 CRUD", header:"일정 CRUD + 상태 동기화", sub:"SCHEDULE SYNC",    dark:false },
  { label:"전역 상태 관리", header:"전역 상태 관리 구조", sub:"STATE PATTERN",     dark:false },
  { label:"데모",       header:"",             sub:"",                   dark:false },
  { label:"FastAPI",   header:"FastAPI 백엔드 현황",  sub:"BACKEND",            dark:true  },

  { label:"향후 계획", header:"향후 계획",            sub:"NEXT STEPS",         dark:false },
  { label:"G-Valley",  header:"G-Valley \uC18C\uAC1C",    sub:"ABOUT G-VALLEY",     dark:false },
  { label:"Q&A",       header:"",              sub:"",                   dark:true  },
];

// ── 슬라이드 렌더 함수 ───────────────────────────────────────
function renderSlide(idx) {
  switch(idx) {
    case 0: return slide_title();
    case 1: return slide_summary();
    case 2: return slide_flutter();
    case 3: return slide_email_auth();
    case 4: return slide_jwt_autologin();
    case 5: return slide_backend_api();
    case 6: return slide_personality();
    case 7: return slide_schedule_crud();
    case 8: return slide_global_state();
    case 9: return `<div style="height:100%;display:flex;align-items:center;justify-content:center;"><iframe src="purby_phone.html" width="340" height="700" style="border:none;background:transparent;" scrolling="no"></iframe></div>`;
    case 10: return slide_fastapi();
    case 11: return slide_nextsteps();
    case 12: return slide_gvalley();
    case 13: return slide_qa();
    default: return "";
  }
}

function slide_email_auth() {
  const points = [
    { icon:"1", text:"단순 가입이 아닌 이메일 인증 3단계 플로우 구현" },
    { icon:"2", text:"백엔드 FastAPI와 실제 HTTP 통신" },
    { icon:"3", text:"인증 전엔 가입 버튼 비활성화 (_codeVerified 상태 관리)" },
  ];
  const code = `final response = await http.post(
  Uri.parse(
    'http://10.0.2.2:8000/auth/send-code',
  ),
  body: jsonEncode({'email': email}),
);`;
  return `
  <div class="slide" style="gap:20px;justify-content:center;">
    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start;">

      <!-- 코드 블록 -->
      <div style="background:#1E1538;border-radius:12px;overflow:hidden;border:1px solid rgba(107,92,231,0.35);">
        <div style="background:#251B4B;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(107,92,231,0.2);">
          <div style="width:10px;height:10px;border-radius:50%;background:#F87171;"></div>
          <div style="width:10px;height:10px;border-radius:50%;background:#F59E0B;"></div>
          <div style="width:10px;height:10px;border-radius:50%;background:#22C55E;"></div>
          <span style="margin-left:8px;font-size:14px;color:#8B88AA;">signup_screen.dart</span>
        </div>
        <pre style="margin:0;padding:20px 22px;font-family:Consolas,'Courier New',monospace;font-size:17px;line-height:1.7;color:#E2E0FF;white-space:pre;overflow-x:auto;"><span style="color:#9B8FFF;">final</span> response = <span style="color:#9B8FFF;">await</span> <span style="color:#60A5FA;">http</span>.<span style="color:#22C55E;">post</span>(
  Uri.<span style="color:#22C55E;">parse</span>(
    <span style="color:#F59E0B;">'http://10.0.2.2:8000/auth/send-code'</span>,
  ),
  body: <span style="color:#60A5FA;">jsonEncode</span>({<span style="color:#F59E0B;">'email'</span>: email}),
);</pre>
      </div>

      <!-- 설명 -->
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="margin-bottom:4px;">
          <span style="font-size:14px;font-weight:700;letter-spacing:2px;color:#8B88AA;">FLUTTER → FASTAPI</span>
        </div>
        ${points.map(p => `
        <div style="background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #E8E3FF;border-left:4px solid #6B5CE7;display:flex;gap:14px;align-items:flex-start;">
          <div style="width:26px;height:26px;border-radius:50%;background:#6B5CE7;color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${p.icon}</div>
          <span style="font-size:17px;color:#1E1240;line-height:1.6;">${p.text}</span>
        </div>`).join("")}
      </div>

    </div>
  </div>`;
}

function slide_jwt_autologin() {
  const points = [
    { icon:"1", text:"앱 시작 시 토큰 유무 자동 확인" },
    { icon:"2", text:"로그인 상태 유지 — 재로그인 불필요" },
    { icon:"3", text:"SharedPreferences로 토큰 로컬 저장" },
  ];
  return `
  <div class="slide" style="gap:20px;justify-content:center;">
    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start;">

      <!-- 코드 블록 -->
      <div style="background:#1E1538;border-radius:12px;overflow:hidden;border:1px solid rgba(107,92,231,0.35);">
        <div style="background:#251B4B;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(107,92,231,0.2);">
          <div style="width:10px;height:10px;border-radius:50%;background:#F87171;"></div>
          <div style="width:10px;height:10px;border-radius:50%;background:#F59E0B;"></div>
          <div style="width:10px;height:10px;border-radius:50%;background:#22C55E;"></div>
          <span style="margin-left:8px;font-size:14px;color:#8B88AA;">main_screen.dart</span>
        </div>
        <pre style="margin:0;padding:20px 22px;font-family:Consolas,'Courier New',monospace;font-size:16px;line-height:1.75;color:#E2E0FF;white-space:pre;overflow-x:auto;"><span style="color:#9B8FFF;">Future</span>&lt;<span style="color:#9B8FFF;">void</span>&gt; <span style="color:#22C55E;">_checkAutoLogin</span>() <span style="color:#9B8FFF;">async</span> {
  <span style="color:#9B8FFF;">final</span> prefs = <span style="color:#9B8FFF;">await</span> SharedPreferences.<span style="color:#22C55E;">getInstance</span>();
  <span style="color:#9B8FFF;">final</span> token = prefs.<span style="color:#22C55E;">getString</span>(<span style="color:#F59E0B;">'auth_token'</span>) ?? <span style="color:#F59E0B;">''</span>;
  <span style="color:#9B8FFF;">if</span> ((prefs.<span style="color:#22C55E;">getBool</span>(<span style="color:#F59E0B;">'logged_in'</span>) ?? <span style="color:#60A5FA;">false</span>)
      && token.<span style="color:#22C55E;">isNotEmpty</span>) {
    <span style="color:#22C55E;">setState</span>(() {
      _token = token;
      _loggedIn = <span style="color:#60A5FA;">true</span>;
    });
  }
}</pre>
      </div>

      <!-- 설명 -->
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="margin-bottom:4px;">
          <span style="font-size:14px;font-weight:700;letter-spacing:2px;color:#8B88AA;">SHARED PREFERENCES</span>
        </div>
        ${points.map(p => `
        <div style="background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #E8E3FF;border-left:4px solid #6B5CE7;display:flex;gap:14px;align-items:flex-start;">
          <div style="width:26px;height:26px;border-radius:50%;background:#6B5CE7;color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${p.icon}</div>
          <span style="font-size:17px;color:#1E1240;line-height:1.6;">${p.text}</span>
        </div>`).join("")}
      </div>

    </div>
  </div>`;
}

function slide_backend_api() {
  const points = [
    { icon:"1", text:"설정 변경 즉시 서버 PATCH 요청" },
    { icon:"2", text:"JWT Bearer Token 인증 헤더 포함" },
    { icon:"3", text:"로컬 setState + 서버 동기화 동시 처리" },
  ];
  return `
  <div class="slide" style="gap:20px;justify-content:center;">
    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start;">

      <div style="background:#1E1538;border-radius:12px;overflow:hidden;border:1px solid rgba(107,92,231,0.35);">
        <div style="background:#251B4B;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(107,92,231,0.2);">
          <div style="width:10px;height:10px;border-radius:50%;background:#F87171;"></div>
          <div style="width:10px;height:10px;border-radius:50%;background:#F59E0B;"></div>
          <div style="width:10px;height:10px;border-radius:50%;background:#22C55E;"></div>
          <span style="margin-left:8px;font-size:14px;color:#8B88AA;">settings_screen.dart</span>
        </div>
        <pre style="margin:0;padding:20px 22px;font-family:Consolas,'Courier New',monospace;font-size:15px;line-height:1.75;color:#E2E0FF;white-space:pre;overflow-x:auto;"><span style="color:#9B8FFF;">Future</span>&lt;<span style="color:#9B8FFF;">void</span>&gt; <span style="color:#22C55E;">_patchSettings</span>(
  <span style="color:#9B8FFF;">Map</span>&lt;<span style="color:#9B8FFF;">String</span>, <span style="color:#9B8FFF;">dynamic</span>&gt; updates) <span style="color:#9B8FFF;">async</span> {
  <span style="color:#9B8FFF;">await</span> http.<span style="color:#22C55E;">patch</span>(
    Uri.<span style="color:#22C55E;">parse</span>(<span style="color:#F59E0B;">'http://10.0.2.2:8000/settings'</span>),
    headers: {
      <span style="color:#F59E0B;">'Authorization'</span>:
        <span style="color:#F59E0B;">'Bearer \${widget.token}'</span>},
    body: <span style="color:#60A5FA;">jsonEncode</span>(updates),
  );
}
<span style="color:#8B88AA;">// 토글 하나 바꿀 때마다 즉시 서버 반영</span>
<span style="color:#22C55E;">onChanged</span>: (v) {
  <span style="color:#22C55E;">setState</span>(() => sleepEnabled = v);
  <span style="color:#22C55E;">_patchSettings</span>({<span style="color:#F59E0B;">'sleep_enabled'</span>: v});
}</pre>
      </div>

      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="margin-bottom:4px;">
          <span style="font-size:14px;font-weight:700;letter-spacing:2px;color:#8B88AA;">FLUTTER → FASTAPI PATCH</span>
        </div>
        ${points.map(p => `
        <div style="background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #E8E3FF;border-left:4px solid #6B5CE7;display:flex;gap:14px;align-items:flex-start;">
          <div style="width:26px;height:26px;border-radius:50%;background:#6B5CE7;color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${p.icon}</div>
          <span style="font-size:17px;color:#1E1240;line-height:1.6;">${p.text}</span>
        </div>`).join("")}
      </div>

    </div>
  </div>`;
}

function slide_personality() {
  const points = [
    { icon:"1", text:"선택한 성격이 AI 응답 스타일에 반영" },
    { icon:"2", text:"선택 즉시 PATCH /settings로 서버 저장" },
    { icon:"3", text:"앱의 핵심 차별점" },
  ];
  const personas = [

// ── 네비게이션 ────────────────────────────────────────────────
let current = 0;

function goTo(idx) {
  if (idx < 0 || idx >= SLIDES.length) return;
  current = idx;
  render();
}

function render() {
  const s = SLIDES[current];
  const body = document.body;
  const wrapper = document.getElementById("slide-wrapper");

  // 배경 전환
  body.style.background = s.dark ? C.bg : "#F5F3FF";

  // 헤더 제목
  const hdr = document.getElementById("slide-header");
  if (s.header) {
    hdr.style.display = "flex";
    document.getElementById("slide-title-text").textContent = s.header;
    document.getElementById("slide-title-text").style.color = s.dark ? "#fff" : C.text;
    document.getElementById("slide-label-text").textContent = s.sub;
  } else {
    hdr.style.display = "none";
  }

  // 슬라이드 콘텐츠
  document.getElementById("slide-body").innerHTML = renderSlide(current);

  // 애니메이션 재트리거
  wrapper.style.animation = "none";
  wrapper.offsetHeight;
  wrapper.style.animation = "fadeSlide 0.35s ease forwards";

  // 내비 탭
  document.querySelectorAll(".nav-tab").forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });

  // 도트
  document.querySelectorAll(".dot").forEach((el, i) => {
    el.style.width = i === current ? "20px" : "7px";
    el.style.background = i === current ? C.purple : "rgba(139,136,170,0.4)";
  });

  // 버튼 상태
  document.getElementById("btn-prev").disabled = current === 0;
  const nextBtn = document.getElementById("btn-next");
  nextBtn.disabled = current === SLIDES.length - 1;
  nextBtn.style.background = current === SLIDES.length - 1 ? "none" : C.purple;
  nextBtn.style.opacity = current === SLIDES.length - 1 ? "0.4" : "1";

  // 진행바
  document.getElementById("progress-fill").style.width =
    ((current + 1) / SLIDES.length * 100) + "%";
}

// ── 초기화 ────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  // 탭 버튼
  const navTabs = document.getElementById("nav-tabs");
  SLIDES.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-tab";
    btn.textContent = s.label;
    btn.onclick = () => goTo(i);
    navTabs.appendChild(btn);
  });

  // 도트
  const dots = document.getElementById("dots");
  SLIDES.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot";
    d.onclick = () => goTo(i);
    dots.appendChild(d);
  });

  document.getElementById("btn-prev").onclick = () => goTo(current - 1);
  document.getElementById("btn-next").onclick = () => goTo(current + 1);

  window.addEventListener("keydown", e => {
    if (e.key === "ArrowRight" || e.key === " ") goTo(current + 1);
    if (e.key === "ArrowLeft") goTo(current - 1);
  });

  render();
});
</script>
